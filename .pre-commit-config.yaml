# Run: uvx pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: secret-gate
        name: secret/personal-data gate (added lines)
        entry: python tools/scan_staged.py --staged
        language: system
        pass_filenames: false
